<svg width="680" height="300" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
<title>RAG pipeline architecture</title>
<desc>Two-phase diagram: an indexing phase that turns uploaded PDFs into a searchable vector index, and a query phase that answers questions using that index and Groq's LLM.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="40" y="60" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="107" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Upload PDFs</text>
<text x="107" y="98" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">Multiple files</text>

<rect x="190" y="60" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="257" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Extract text</text>
<text x="257" y="98" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">pymupdf4llm</text>

<rect x="340" y="60" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="407" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Chunk text</text>
<text x="407" y="98" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">By section</text>

<rect x="490" y="60" width="135" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="557" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041">Build index</text>
<text x="557" y="98" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">MiniLM + FAISS</text>

<line x1="175" y1="88" x2="190" y2="88" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="325" y1="88" x2="340" y2="88" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="475" y1="88" x2="490" y2="88" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="40" y="200" width="135" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="107" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">User question</text>
<text x="107" y="238" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">Typed in chat</text>

<rect x="190" y="200" width="135" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="257" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">Hybrid search</text>
<text x="257" y="238" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">Text + vector</text>

<rect x="340" y="200" width="135" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="407" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">Groq LLM</text>
<text x="407" y="238" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">Writes answer</text>

<rect x="490" y="200" width="135" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="557" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#3C3489">Cited answer</text>
<text x="557" y="238" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">Source + page</text>

<line x1="175" y1="228" x2="190" y2="228" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="325" y1="228" x2="340" y2="228" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="475" y1="228" x2="490" y2="228" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<path d="M557 116 L557 150 L257 150 L257 200" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
</svg>
